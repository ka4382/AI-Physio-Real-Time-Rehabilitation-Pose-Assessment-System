<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-Physio | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --surface: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.08);
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #38bdf8;
    --accent2: #34d399;
    --danger: #f87171;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Syne',sans-serif; background:var(--bg); color:var(--text);
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background-image: radial-gradient(ellipse at 30% 20%, rgba(56,189,248,0.06) 0%, transparent 50%),
                      radial-gradient(ellipse at 70% 80%, rgba(52,211,153,0.04) 0%, transparent 50%);
  }
  .auth-container {
    width:100%; max-width:460px; padding:40px; border-radius:24px;
    background:rgba(255,255,255,0.03); border:1px solid var(--border);
    backdrop-filter:blur(12px);
  }
  .logo { text-align:center; margin-bottom:32px; }
  .logo h1 { font-size:1.8rem; font-weight:800; }
  .logo .badge {
    display:inline-block; margin-top:6px; font-size:0.55rem; font-weight:700;
    letter-spacing:0.12em; padding:3px 10px; border-radius:6px;
    background:rgba(56,189,248,0.15); color:var(--accent); border:1px solid rgba(56,189,248,0.3);
  }
  .tabs { display:flex; gap:4px; margin-bottom:24px; background:rgba(255,255,255,0.02); border-radius:12px; padding:4px; }
  .tab-btn {
    flex:1; padding:10px; border:none; border-radius:10px; font-family:'Syne',sans-serif;
    font-weight:700; font-size:0.85rem; cursor:pointer; transition:all 0.2s;
    background:transparent; color:var(--muted);
  }
  .tab-btn.active { background:rgba(56,189,248,0.15); color:var(--accent); }
  .form-group { margin-bottom:14px; }
  .form-group label {
    display:block; font-size:0.7rem; font-weight:700; letter-spacing:0.08em;
    color:var(--muted); margin-bottom:5px; text-transform:uppercase;
  }
  .form-group input {
    width:100%; padding:11px 14px; border-radius:10px; border:1px solid var(--border);
    background:rgba(255,255,255,0.04); color:var(--text); font-family:'DM Mono',monospace;
    font-size:0.85rem; transition:border-color 0.2s; outline:none;
  }
  .form-group input:focus { border-color:var(--accent); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .btn-submit {
    width:100%; padding:13px; border:none; border-radius:12px; font-family:'Syne',sans-serif;
    font-weight:700; font-size:0.95rem; cursor:pointer; margin-top:8px;
    background:linear-gradient(135deg,#0ea5e9,#34d399); color:#000;
    box-shadow:0 4px 20px rgba(14,165,233,0.3); transition:all 0.25s;
  }
  .btn-submit:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(14,165,233,0.5); }
  .btn-submit:disabled { opacity:0.5; cursor:not-allowed; transform:none !important; }
  .error-msg {
    display:none; padding:10px 14px; border-radius:10px; font-size:0.78rem; font-weight:600;
    margin-bottom:14px; background:rgba(248,113,113,0.1); color:var(--danger);
    border:1px solid rgba(248,113,113,0.2);
  }
  .success-msg {
    display:none; padding:10px 14px; border-radius:10px; font-size:0.78rem; font-weight:600;
    margin-bottom:14px; background:rgba(52,211,153,0.1); color:var(--accent2);
    border:1px solid rgba(52,211,153,0.2);
  }
  .google-btn {
    width:100%; padding:12px; border-radius:12px; font-family:'Syne',sans-serif;
    font-weight:700; font-size:0.85rem; cursor:pointer; margin-top:10px;
    background:rgba(255,255,255,0.06); color:var(--text); border:1px solid var(--border);
    transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .google-btn:hover { border-color:rgba(56,189,248,0.3); background:rgba(255,255,255,0.08); }
  .divider {
    display:flex; align-items:center; gap:12px; margin:16px 0;
    font-size:0.7rem; color:var(--muted); font-weight:600;
  }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
</style>
</head>
<body>
<div class="auth-container">
  <div class="logo">
    <h1>⚡ AI-Physio</h1>
    <span class="badge">SMART REHABILITATION</span>
  </div>

  <div id="error" class="error-msg"></div>
  <div id="success" class="success-msg"></div>

  <div class="tabs">
    <button class="tab-btn active" id="tab-login" onclick="showTab('login')">Login</button>
    <button class="tab-btn" id="tab-signup" onclick="showTab('signup')">Sign Up</button>
  </div>

  <!-- LOGIN FORM -->
  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn-submit" id="login-btn">Login</button>
    <div class="divider">or</div>
    <button type="button" class="google-btn" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>
  </form>

  <!-- SIGNUP FORM -->
  <form id="signup-form" style="display:none" onsubmit="handleSignup(event)">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="signup-name" placeholder="John Doe" required>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signup-email" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signup-password" placeholder="Min 6 characters" required minlength="6">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="signup-phone" placeholder="+1 234 567">
      </div>
      <div class="form-group">
        <label>Age</label>
        <input type="number" id="signup-age" placeholder="25" min="1" max="120">
      </div>
    </div>
    <div class="form-group">
      <label>Date of Birth</label>
      <input type="date" id="signup-dob">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Height (cm)</label>
        <input type="number" id="signup-height" placeholder="170" step="0.1">
      </div>
      <div class="form-group">
        <label>Weight (kg)</label>
        <input type="number" id="signup-weight" placeholder="70" step="0.1">
      </div>
    </div>
    <button type="submit" class="btn-submit" id="signup-btn">Create Account</button>
  </form>
</div>

<script>
function showTab(tab) {
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('tab-login').className = 'tab-btn' + (tab === 'login' ? ' active' : '');
  document.getElementById('tab-signup').className = 'tab-btn' + (tab === 'signup' ? ' active' : '');
  hideMsg();
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('success').style.display = 'none';
}
function showSuccess(msg) {
  const el = document.getElementById('success');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('error').style.display = 'none';
}
function hideMsg() {
  document.getElementById('error').style.display = 'none';
  document.getElementById('success').style.display = 'none';
}

async function handleLogin(e) {
  e.preventDefault();
  hideMsg();
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Logging in...';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value,
      })
    });
    const data = await res.json();
    if (res.ok) {
      showSuccess('Welcome back, ' + data.name + '!');
      setTimeout(() => window.location.href = '/', 800);
    } else {
      showError(data.error);
    }
  } catch(err) {
    showError('Network error');
  }
  btn.disabled = false; btn.textContent = 'Login';
}

async function handleSignup(e) {
  e.preventDefault();
  hideMsg();
  const btn = document.getElementById('signup-btn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    const res = await fetch('/api/signup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        name: document.getElementById('signup-name').value,
        email: document.getElementById('signup-email').value,
        password: document.getElementById('signup-password').value,
        phone: document.getElementById('signup-phone').value,
        age: document.getElementById('signup-age').value || null,
        dob: document.getElementById('signup-dob').value || null,
        height: document.getElementById('signup-height').value || null,
        weight: document.getElementById('signup-weight').value || null,
      })
    });
    const data = await res.json();
    if (res.ok) {
      showSuccess('Account created! Redirecting...');
      setTimeout(() => window.location.href = '/', 800);
    } else {
      showError(data.error);
    }
  } catch(err) {
    showError('Network error');
  }
  btn.disabled = false; btn.textContent = 'Create Account';
}

function googleLogin() {
  showError('Google OAuth requires a Google Cloud project. Configure your OAuth credentials to enable this feature.');
}
</script>
</body>
</html>
